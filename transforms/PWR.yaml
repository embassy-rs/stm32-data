transforms:
  - !DeleteEnums
    from: ^(PRIV|RRSB|SEC|RADIORSB|REGPARDYVDDRFPA)$

  - !MakeFieldArray
    fieldsets: WUSC?R
    from: (C?WUF)\d
    to: $1

  - !MakeFieldArray
    fieldsets: WUCR
    from: (WUPEN|WUPP(UPD)?)\d
    to: $1

  - !MakeFieldArray
    fieldsets: SECCFGR
    from: (WUP)\d(SEC)
    to: $1$2
  
  - !MergeEnums
      from: WUPPUPD.*
      to: WUPPUPD

  - !MergeEnums
      from: WUPP\d
      to: WUPP
  
  - !MergeEnums
      from: WUF\d
      to: WUF

  - !MergeEnums
      from: WUPEN\d
      to: WUPEN

  - !MergeEnums
      from: CWUF\d
      to: CWUF
  
  - !MergeEnums
      from: SRAM.*SO
      to: SRAM_SO

  - !MergeEnums
      from: .*RETEN
      to: RETEN



