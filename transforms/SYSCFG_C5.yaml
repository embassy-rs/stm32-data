transforms:
  - !DeleteEnums
    from: .*_RMP2?
    bit_size: 1
    keep_desc: true

  - !MergeEnums
    from: .*_FMP
    to: FMP
    keep_desc: true

  - !DeleteEnums
    from: ^(LOCKUP_LOCK|PVD_LOCK|SRAM_PARITY_LOCK)$

  - !DeleteEnums
    from: ^.*MPU$

  - !DeleteEnums
    from: ^.*VTOR$

  - !DeleteEnums
    from: ^.*EN1$

  - !DeleteEnums
    from: ^.*RDY1$

  - !DeleteEnums
    from: ^CLL$