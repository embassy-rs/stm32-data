matches:
  family: STM32H5
peripherals:
  # Corresponds to cmosM40_opamp_v1_0_Cube
  # STM32H5 variant
  - name: OPAMP1
    pins:
      - pin: PC5
        signal: VINM0
      - pin: PB1
        signal: VINM1
      - pin: PB0
        signal: VINP0
      - pin: PA0
        signal: VINP2
      - pin: PA7
        signal: VOUT
  - name: DLYB_SDMMC1
    address: 0x46008400
    registers:
      kind: dlyb
      version: v1
      block: DLYB
  - name: DLYB_OCTOSPI1
    address: 0x4600F000
    registers:
      kind: dlyb
      version: v1
      block: DLYB
