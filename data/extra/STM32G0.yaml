matches:
  family: STM32G0
peripherals:
  - name: VREFINTCAL
    address: 0x1FFF75AA
    registers:
      kind: vrefintcal
      version: v1
      block: VREFINTCAL
  - name: TAMP
    address: 0x4000B000
    registers:
      kind: tamp
      version: g0
      block: TAMP
  # Comparator (COMP) pin channel assignments from RM0444 Rev 6.
  # Tables 93/95/97: INPSEL -> INP0-INP2,
  # INMSEL=0110 -> INM0, INMSEL=0111 -> INM1, INMSEL=1000 -> INM2.
  # The MCU XML only has generic INP/INM without channel numbers.
  # Pins not present on a given package are automatically filtered out.
  - name: COMP1
    pins:
      - pin: PC5
        signal: INP0
      - pin: PB2
        signal: INP1
      - pin: PA1
        signal: INP2
      - pin: PB1
        signal: INM0
      - pin: PC4
        signal: INM1
      - pin: PA0
        signal: INM2
  - name: COMP2
    pins:
      - pin: PB4
        signal: INP0
      - pin: PB6
        signal: INP1
      - pin: PA3
        signal: INP2
      - pin: PB3
        signal: INM0
      - pin: PB7
        signal: INM1
      - pin: PA2
        signal: INM2
  - name: COMP3
    pins:
      - pin: PB0
        signal: INP0
      - pin: PC1
        signal: INP1
      - pin: PE7
        signal: INP2
      - pin: PB2
        signal: INM0
      - pin: PC0
        signal: INM1
      - pin: PE8
        signal: INM2