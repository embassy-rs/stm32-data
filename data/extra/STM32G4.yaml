matches:
  family: STM32G4
peripherals:
  - name: VREFINTCAL
    address: 0x1FFF75AA
    registers:
      kind: vrefintcal
      version: v1
      block: VREFINTCAL
  - name: TAMP
    address: 0x40002400
    registers:
      kind: tamp
      version: g4
      block: TAMP
  # Corresponds to G4_tsmc90_fastOpamp_Cube
  - name: OPAMP1
    pins:
      - pin: PA1
        signal: VINP0
      - pin: PA3
        signal: VINP1
      - pin: PA7
        signal: VINP2
      - pin: PA3
        signal: VINM0
      - pin: PC5
        signal: VINM1
      - pin: PA2
        signal: VOUT
  - name: OPAMP2
    pins:
      - pin: PA7
        signal: VINP0
      - pin: PB14
        signal: VINP1
      - pin: PB0
        signal: VINP2
      - pin: PD14
        signal: VINP3
      - pin: PA5
        signal: VINM0
      - pin: PC5
        signal: VINM1
      - pin: PA6
        signal: VOUT
  - name: OPAMP3
    pins:
      - pin: PB0
        signal: VINP0
      - pin: PB13
        signal: VINP1
      - pin: PA1
        signal: VINP2
      - pin: PB2
        signal: VINM0
      - pin: PB10
        signal: VINM1
      - pin: PB1
        signal: VOUT
  - name: OPAMP4
    pins:
      - pin: PB13
        signal: VINP0
      - pin: PD11
        signal: VINP1
      - pin: PB11
        signal: VINP2
      - pin: PB10
        signal: VINM0
      - pin: PD8
        signal: VINM1
      - pin: PB12
        signal: VOUT
  - name: OPAMP5
    pins:
      - pin: PB14
        signal: VINP0
      - pin: PD12
        signal: VINP1
      - pin: PC3
        signal: VINP2
      - pin: PB15
        signal: VINM0
      - pin: PA3
        signal: VINM1
      - pin: PA8
        signal: VOUT
  - name: OPAMP6
    pins:
      - pin: PB12
        signal: VINP0
      - pin: PD9
        signal: VINP1
      - pin: PB13
        signal: VINP2
      - pin: PA1
        signal: VINM0
      - pin: PB1
        signal: VINM1
      - pin: PB11
        signal: VOUT
  # Comparator (COMP) pin channel assignments from RM0440 Rev 5.
  # Table 195: INPSEL -> INP0/INP1, Table 196: INMSEL=110 -> INM0, INMSEL=111 -> INM1.
  # The MCU XML only has generic INP/INM without channel numbers.
  # Pins not present on a given package are automatically filtered out.
  - name: COMP1
    pins:
      - pin: PA1
        signal: INP0
      - pin: PB1
        signal: INP1
      - pin: PA4
        signal: INM0
      - pin: PA0
        signal: INM1
  - name: COMP2
    pins:
      - pin: PA7
        signal: INP0
      - pin: PA3
        signal: INP1
      - pin: PA5
        signal: INM0
      - pin: PA2
        signal: INM1
  - name: COMP3
    pins:
      - pin: PA0
        signal: INP0
      - pin: PC1
        signal: INP1
      - pin: PF1
        signal: INM0
      - pin: PC0
        signal: INM1
  - name: COMP4
    pins:
