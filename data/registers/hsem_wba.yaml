block/HSEM:
  description: Hardware semaphore (HSEM), STM32WBA.
  items:
  - name: R
    description: HSEM 2-step write lock and read-back registers R0–R15.
    array:
      len: 16
      stride: 4
    byte_offset: 0
    fieldset: R
  - name: RLR
    description: HSEM 1-step read lock registers RLR0–RLR15.
    array:
      len: 16
      stride: 4
    byte_offset: 128
    access: Read
    fieldset: RLR
  - name: IER
    description: HSEM interrupt enable register.
    byte_offset: 256
    fieldset: IER
  - name: ICR
    description: HSEM interrupt clear register.
    byte_offset: 260
    fieldset: ICR
  - name: ISR
    description: HSEM interrupt status register.
    byte_offset: 264
    access: Read
    fieldset: ISR
  - name: MISR
    description: HSEM masked interrupt status register.
    byte_offset: 268
    access: Read
    fieldset: MISR
  - name: SIER
    description: HSEM secure interrupt enable register.
    byte_offset: 384
    fieldset: SIER
  - name: SICR
    description: HSEM secure interrupt clear register.
    byte_offset: 388
    fieldset: SICR
  - name: SISR
    description: HSEM secure interrupt status register.
    byte_offset: 392
    access: Read
    fieldset: SISR
  - name: SMISR
    description: HSEM secure masked interrupt status register.
    byte_offset: 396
    access: Read
    fieldset: SMISR
  - name: SECCFGR
    description: HSEM security configuration register.
    byte_offset: 512
    fieldset: SECCFGR
  - name: PRIVCFGR
    description: HSEM privilege configuration register.
    byte_offset: 528
    fieldset: PRIVCFGR
  - name: CR
    description: HSEM semaphore clear register.
    byte_offset: 560
    access: Write
    fieldset: CR
  - name: KEYR
    description: HSEM semaphore clear key register.
    byte_offset: 564
    fieldset: KEYR
fieldset/CR:
  description: HSEM semaphore clear register.
  fields:
  - name: LOCKID
    description: LOCKID of semaphores to be cleared.
    bit_offset: 8
    bit_size: 4
  - name: SEC
    description: SEC value of semaphores to be cleared.
    bit_offset: 12
    bit_size: 1
  - name: PRIV
    description: PRIV value of semaphores to be cleared.
    bit_offset: 13
    bit_size: 1
  - name: KEY
    description: Semaphore clear key.
    bit_offset: 16
    bit_size: 16
fieldset/ICR:
  description: HSEM interrupt clear register.
  fields:
  - name: ISC
    description: Interrupt semaphore n clear bit.
    bit_offset: 0
    bit_size: 1
    array:
      len: 16
      stride: 1
fieldset/IER:
  description: HSEM interrupt enable register.
  fields:
  - name: ISE
    description: Interrupt semaphore n enable bit.
    bit_offset: 0
    bit_size: 1
    array:
      len: 16
      stride: 1
fieldset/ISR:
  description: HSEM interrupt status register.
  fields:
  - name: ISF
    description: Interrupt semaphore n status bit before enable (mask).
    bit_offset: 0
    bit_size: 1
    array:
      len: 16
      stride: 1
fieldset/KEYR:
  description: HSEM semaphore clear key register.
  fields:
  - name: KEY
    description: Semaphore clear key.
    bit_offset: 16
    bit_size: 16
fieldset/MISR:
  description: HSEM masked interrupt status register.
  fields:
  - name: MISF
    description: Masked interrupt semaphore n status bit after enable (mask).
    bit_offset: 0
    bit_size: 1
    array:
      len: 16
      stride: 1
fieldset/PRIVCFGR:
  description: HSEM privilege configuration register.
  fields:
  - name: PRIV
    description: Semaphore n privilege attribute status bit.
    bit_offset: 0
    bit_size: 1
    array:
      len: 16
      stride: 1
fieldset/R:
  description: HSEM semaphore register.
  fields:
  - name: PROCID
    description: Semaphore process ID.
    bit_offset: 0
    bit_size: 8
  - name: LOCKID
    description: Semaphore lock ID.
    bit_offset: 8
    bit_size: 4
  - name: SEC
    description: Semaphore secure bit.
    bit_offset: 12
    bit_size: 1
  - name: PRIV
    description: Semaphore privilege bit.
    bit_offset: 13
    bit_size: 1
  - name: LOCK
    description: Lock indication.
    bit_offset: 31
    bit_size: 1
fieldset/RLR:
  description: HSEM read lock register.
  fields:
  - name: PROCID
    description: Semaphore process ID.
