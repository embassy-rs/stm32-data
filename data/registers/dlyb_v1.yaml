block/DLYB:
  description: Delay Block for specified pheripheral
  items:
  - name: CR
    description: DLYB control register.
    byte_offset: 0
    fieldset: CR
  - name: CFGR
    description: DLYB configuration register.
    byte_offset: 4
    fieldset: CFGR
fieldset/CFGR:
  description: DLYB configuration register.
  fields:
  - name: SEL
    description: Select the phase for the Output clock.
    bit_offset: 0
    bit_size: 4
  - name: UNIT
    description: Delay Defines the delay of a Unit delay cell.
    bit_offset: 8
    bit_size: 7
  - name: LNG
    description: Delay line length value.
    bit_offset: 16
    bit_size: 12
  - name: LNGF
    description: Length valid flag.
    bit_offset: 31
    bit_size: 1
fieldset/CR:
  description: DLYB control register.
  fields:
  - name: DEN
    description: Delay block enable bit.
    bit_offset: 0
    bit_size: 1
  - name: SEN
    description: Sampler length enable bit.
    bit_offset: 1
    bit_size: 1
