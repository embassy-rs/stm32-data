block/TZIC:
  description: TrustZone interrupt controller.
  items:
  - name: IER
    description: TZIC interrupt enable register.
    byte_offset: 0
    array:
      len: 3
      stride: 4
    fieldset: IER
  - name: SR
    description: TZIC status register.
    byte_offset: 16
    array:
      len: 3
      stride: 4
    fieldset: SR
  - name: FCR
    description: TZIC flag clear register.
    byte_offset: 32
    array:
      len: 3
      stride: 4
    fieldset: FCR

block/MPCBB:
  description: Block-based memory protection controller.
  items:
  - name: CR
    description: MPCBB control register.
    byte_offset: 0
    fieldset: MPCBB_CR
  - name: LCKVTR
    description: MPCBB lock vector register.
    byte_offset: 16
    array:
      len: 2
      stride: 4
    fieldset: LCKVTR
  - name: VCTR
    description: MPCBB security configuration register.
    byte_offset: 256
    array:
      len: 64
      stride: 4
    fieldset: VCTR

fieldset/IER:
  description: TZIC interrupt enable register.
  fields:
  - name: IE
    bit_offset: 0
    bit_size: 32

fieldset/SR:
  description: TZIC status register.
  fields:
  - name: F
    bit_offset: 0
    bit_size: 32

fieldset/FCR:
  description: TZIC flag clear register.
  fields:
  - name: CF
    bit_offset: 0
    bit_size: 32

fieldset/MPCBB_CR:
  description: MPCBB control register.
  fields:
  - name: LCK
    bit_offset: 0
    bit_size: 1
  - name: INVSECSTATE
    bit_offset: 30
    bit_size: 1
  - name: SRWILADIS
    bit_offset: 31
    bit_size: 1

fieldset/LCKVTR:
  description: MPCBB lock vector register.
  fields:
  - name: LCKSB
    bit_offset: 0
    bit_size: 32

fieldset/VCTR:
  description: MPCBB security configuration register.
  fields:
  - name: B
    bit_offset: 0
    bit_size: 32
