      for details.'
    fieldset: RCC_PLL2CFGR2
    name: RCC_PLL2CFGR2
  - byte_offset: 160
    description: 'This register is used to fine-tune the frequency of the PLL2 VCO.
      If TZEN = , this register can only be modified in secure mode. Write access
      to this register is not allowed during the clock restore sequence. See Section:
      The clock restore sequence description for details.'
    fieldset: RCC_PLL2FRACR
    name: RCC_PLL2FRACR
  - byte_offset: 164
    description: 'This register is used to configure the PLL2. It is not recommended
      to change the content of this register when the PLL2 is enabled (PLLON = ).
      Refer to Section: Using the PLLs in spread spectrum mode for details. If TZEN
      = , this register can only be modified in secure mode. Write access to this
      register is not allowed during the clock restore sequence. See Section: The
      clock restore sequence description for details.'
    fieldset: RCC_PLL2CSGR
    name: RCC_PLL2CSGR
  - byte_offset: 192
    description: 'This register is used to control the selection of the kernel clock
      for the I2C4 and I2C6. Note that changing the clock source on-the-fly is allowed,
      and will not generate any timing violation, however the user has to ensure that
      both the previous and the new clock sources are present during the switching,
      and for the whole transition time. Refer to Section: Clock enabling delays.
      If TZEN = , this register can only be modified in secure mode.'
    fieldset: RCC_I2C46CKSELR
    name: RCC_I2C46CKSELR
  - byte_offset: 196
    description: 'This register is used to control the selection of the kernel clock
      for the SPI6. Note that changing the clock source on-the-fly is allowed, and
      will not generate any timing violation, however the user has to ensure that
      both the previous and the new clock sources are present during the switching,
      and for the whole transition time. Refer to Section: Clock enabling delays.
      If TZEN = , this register can only be modified in secure mode.'
    fieldset: RCC_SPI6CKSELR
    name: RCC_SPI6CKSELR
  - byte_offset: 200
    description: 'This register is used to control the selection of the kernel clock
      for the USART1. Note that changing the clock source on-the-fly is allowed, and
      will not generate any timing violation, however the user has to ensure that
      both the previous and the new clock sources are present during the switching,
      and for the whole transition time. Refer to Section: Clock enabling delays.
      If TZEN = , this register can only be modified in secure mode.'
    fieldset: RCC_UART1CKSELR
    name: RCC_UART1CKSELR
  - byte_offset: 204
    description: 'This register is used to control the selection of the kernel clock
      for the RNG1. Note that changing the clock source on-the-fly is allowed, and
      will not generate any timing violation, however the user has to ensure that
      both the previous and the new clock sources are present during the switching,
      and for the whole transition time. Refer to Section: Clock enabling delays.
      If TZEN = , this register can only be modified in secure mode.'
    fieldset: RCC_RNG1CKSELR
    name: RCC_RNG1CKSELR
  - byte_offset: 208
    description: 'This register is used to select an oscillator source as kernel clock
      for the per_ck clock. The per_ck clock is distributed to several peripherals.
      Refer to Section: Clock enabling delays.'
    fieldset: RCC_CPERCKSELR
    name: RCC_CPERCKSELR
  - byte_offset: 212
    description: 'This register is used to select the peripheral clock for the STGEN
      block. Note that this clock is used to provide a time reference for the application.
      Refer to Section: Clock enabling delays. If TZEN = , this register can only
      be modified in secure mode.'
    fieldset: RCC_STGENCKSELR
    name: RCC_STGENCKSELR
  - byte_offset: 216
    description: This register is used to control the DDR interface, including the
      DDRC and DDRPHYC. If TZEN = , this register can only be modified in secure mode.
    fieldset: RCC_DDRITFCR
    name: RCC_DDRITFCR
  - byte_offset: 256
    description: 'This register is used to control the HOLD boot function when the
      system exits from Standby. Refer to Section: MCU HOLD_BOOT after processor reset.
      This register is reset when a system reset occurs, but not when the circuit
      exits from Standby (app_rst reset).If TZEN = , this register can only be modified
      in secure mode. This register can only be accessed by the MPU.'
    fieldset: RCC_MP_BOOTCR
    name: RCC_MP_BOOTCR
  - byte_offset: 260
    description: Writing has no effect, reading will return the values of the bits.
      Writing a sets the corresponding bit to . The MCU cannot access to this register.
      If TZEN = , this register can only be modified in secure mode.
    fieldset: RCC_MP_SREQSETR
    name: RCC_MP_SREQSETR
  - byte_offset: 264
    description: Writing has no effect, reading will return the effective values of
