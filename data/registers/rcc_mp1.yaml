  description: 'This register is used to control the LSE function. Wait states are
    inserted in case of successive write accesses to this register. The number of
    wait states may be up to 7 cycles of AHB4 clock.After a system reset, the register
    RCC_BDCR is write-protected. In order to modify this register, the DBP bit in
    the PWR control register 1 (PWR_CR1) has to be set to . Bits of RCC_BDCR register
    are only reset after a backup domain reset: nreset_vsw (see Section10.3.6: Backup
    domain reset). Any other internal or external reset will not have any effect on
    these bits.This register is located into the VSW domain. If TZEN = , this register
    can only be modified in secure mode.'
