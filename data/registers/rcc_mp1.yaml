    has no effect, reading will return the effective values of the corresponding bits.
    Writing a clears the corresponding bit to . In order to identify the reset source,
    the MPU application must use RCC MPU Reset Status Clear Register (RCC_MP_RSTSCLRR),
    and the MCU application must use the RCC MCU Reset Status Clear Register (RCC_MC_RSTSCLRR).
    Refer to Section10.3.13: Reset source identification for details.This register
    except MPUP[1:0]RSTF flags is located into VDD domain, and is reset by por_rst
    reset. The MPUP[1:0]RSTF flags are located into VDDCORE and are reset by nreset.
    If TZEN = , this register can only be modified in secure mode.'
