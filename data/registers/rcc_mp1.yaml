block/RCC:
  description: RCC.
  items:
  - byte_offset: 0
    description: This register is used to switch the RCC into secure mode. This register
      can only be accessed in secure mode.
    fieldset: RCC_TZCR
    name: RCC_TZCR
  - byte_offset: 12
    description: 'This register is used to control the oscillators.Writing to this
      register has no effect, writing will set the corresponding bits. Reading will
      give the effective values of each bit.If TZEN = MCKPROT = , this register can
      only be modified in secure mode. Write access to this register is not allowed
      during the clock restore sequence. See Section: The clock restore sequence description
      for details.'
    fieldset: RCC_OCENSETR
    name: RCC_OCENSETR
  - byte_offset: 16
    description: 'This register is used to control the oscillators.Writing to this
      register has no effect, writing will clear the corresponding bits. Reading will
      give the effective values of the enable bits.If TZEN = , this register can only
      be modified in secure mode. Write access to this register is not allowed during
      the clock restore sequence. See Section: The clock restore sequence description
      for details.'
    fieldset: RCC_OCENCLRR
    name: RCC_OCENCLRR
  - byte_offset: 24
    description: 'This register is used to configure the HSI. If TZEN = , this register
      can only be modified in secure mode. Write access to this register is not allowed
      during the clock restore sequence. See Section: The clock restore sequence description
      for details.'
    fieldset: RCC_HSICFGR
    name: RCC_HSICFGR
  - byte_offset: 28
    description: This register is used to fine-tune the CSI frequency. If TZEN = MCKPROT
      = , this register can only be modified in secure mode. Write access to this
      register is not allowed during the clock restore sequence. See The clock restore
      sequence description for details.
    fieldset: RCC_CSICFGR
    name: RCC_CSICFGR
  - byte_offset: 32
    description: 'This register is used to select the clock source for the MPU. If
      TZEN = , this register can only be modified in secure mode. Write access to
      this register is not allowed during the clock restore sequence. See Section:
      The clock restore sequence description for details.'
    fieldset: RCC_MPCKSELR
    name: RCC_MPCKSELR
  - byte_offset: 36
    description: 'This register is used to select the clock source for the AXI sub-system.
      If TZEN = , this register can only be modified in secure mode. Write access
      to this register is not allowed during the clock restore sequence. See Section:
      The clock restore sequence description for details.'
    fieldset: RCC_ASSCKSELR
    name: RCC_ASSCKSELR
  - byte_offset: 40
    description: 'This register is used to select the reference clock for PLL1 and
      PLL2. If TZEN = , this register can only be modified in secure mode. Write access
      to this register is not allowed during the clock restore sequence. See Section:
      The clock restore sequence description for details.'
    fieldset: RCC_RCK12SELR
    name: RCC_RCK12SELR
  - byte_offset: 44
    description: 'This register is used to control the MPU clock prescaler. Refer
      to Section: Sub-system clock generation for additional information. If TZEN
      = , this register can only be modified in secure mode.'
    fieldset: RCC_MPCKDIVR
    name: RCC_MPCKDIVR
  - byte_offset: 48
    description: 'This register is used to control the AXI Matrix clock prescaler.
      Refer to Section: Sub-system clock generation for additional information. If
      TZEN = , this register can only be modified in secure mode.'
    fieldset: RCC_AXIDIVR
    name: RCC_AXIDIVR
  - byte_offset: 60
    description: 'This register is used to control the APB4 clock divider. Refer to
      Section: Sub-system clock generation for additional information. If TZEN = ,
      this register can only be modified in secure mode.'
    fieldset: RCC_APB4DIVR
    name: RCC_APB4DIVR
  - byte_offset: 64
    description: 'This register is used to control the APB5 clock divider. Refer to
      Section: Sub-system clock generation for additional information. If TZEN = ,
      this register can only be modified in secure mode.'
    fieldset: RCC_APB5DIVR
    name: RCC_APB5DIVR
  - byte_offset: 68
    description: This register is used to divide the HSE clock for RTC. If TZEN =
      , this register can only be modified in secure mode.
    fieldset: RCC_RTCDIVR
    name: RCC_RTCDIVR
  - byte_offset: 72
    description: 'This register is used to select the clock source for the MCU sub-system,
      including the MCU itself. If TZEN = MCKPROT = , this register can only be modified
      in secure mode. Write access to this register is not allowed during the clock
      restore sequence. See Section: The clock restore sequence description for details.'
    fieldset: RCC_MSSCKSELR
    name: RCC_MSSCKSELR
  - byte_offset: 128
    description: 'This register is used to control the PLL1. If TZEN = , this register
      can only be modified in secure mode. Write access to this register is not allowed
      during the clock restore sequence. See Section: The clock restore sequence description
      for details.'
    fieldset: RCC_PLL1CR
    name: RCC_PLL1CR
  - byte_offset: 132
    description: 'This register is used to configure the PLL1. If TZEN = , this register
      can only be modified in secure mode. Write access to this register is not allowed
      during the clock restore sequence. See Section: The clock restore sequence description
      for details.'
    fieldset: RCC_PLL1CFGR1
    name: RCC_PLL1CFGR1
  - byte_offset: 136
    description: 'This register is used to configure the PLL1. If TZEN = , this register
      can only be modified in secure mode. Write access to this register is not allowed
