  - byte_offset: 1024
    description: 'This register is used by the BOOTROM to check the reset source.
      Writing has no effect, reading will return the effective values of the corresponding
      bits. Writing a clears the corresponding bit to . In order to identify the reset
      source, the MPU application must use RCC MPU Reset Status Clear Register (RCC_MP_RSTSCLRR),
      and the MCU application must use the RCC MCU Reset Status Clear Register (RCC_MC_RSTSCLRR).
      Refer to Section10.3.13: Reset source identification for details.This register
      except MPUP[1:0]RSTF flags is located into VDD domain, and is reset by por_rst
      reset. The MPUP[1:0]RSTF flags are located into VDDCORE and are reset by nreset.
      If TZEN = , this register can only be modified in secure mode.'
    fieldset: RCC_BR_RSTSCLRR
    name: RCC_BR_RSTSCLRR
  - byte_offset: 1028
    description: This register is used by the MPU in order to generate either a MCU
      reset or a system reset or a reset of one of the two MPU processors. Writing
      has no effect, reading returns the effective values of the corresponding bits.
      Writing a activates the reset.
    fieldset: RCC_MP_GRSTCSETR
    name: RCC_MP_GRSTCSETR
  - byte_offset: 1032
    description: 'This register is used by the MPU to check the reset source. This
      register is updated by the BOOTROM code, after a power-on reset (por_rst), a
      system reset (nreset), or an exit from Standby or CStandby.Writing has no effect,
      reading will return the effective values of the corresponding bits. Writing
      a clears the corresponding bit to .Refer to Section10.3.13: Reset source identification
      for details.The register is located in VDDCORE.If TZEN = , this register can
      only be modified in secure mode.'
    fieldset: RCC_MP_RSTSCLRR
    name: RCC_MP_RSTSCLRR
  - byte_offset: 1036
    description: This register is used by the BOOTROM in order to freeze the IWDGs
      clocks. After a system reset or Standby reset (nreset), or a CStandby reset
      (cstby_rst) the MPU is allowed to write it once.Writing has no effect, reading
      will return the effective values of the corresponding bits. Writing a sets the
      corresponding bit to . If TZEN = , this register can only be modified in secure
      mode.
    fieldset: RCC_MP_IWDGFZSETR
    name: RCC_MP_IWDGFZSETR
  - byte_offset: 1040
    description: This register is used by the BOOTROM in order to unfreeze the IWDGs
      clocks. Writing has no effect, reading will return the effective values of the
      corresponding bits. Writing a clears the corresponding bit to . If TZEN = ,
      this register can only be modified in secure mode.
    fieldset: RCC_MP_IWDGFZCLRR
    name: RCC_MP_IWDGFZCLRR
  - byte_offset: 1044
    description: 'This register shall be used by the MPU to control the interrupt
      source enable. Refer to Section10.5: RCC interrupts for more details. If TZEN
      = , this register can only be modified in secure mode.'
    fieldset: RCC_MP_CIER
    name: RCC_MP_CIER
  - byte_offset: 1048
    description: 'This register shall be used by the MPU in order to read and clear
      the interrupt flags.Writing has no effect, writing will clear the corresponding
      flag.Refer to Section10.5: RCC interrupts for more details. If TZEN = , this
      register can only be modified in secure mode.'
    fieldset: RCC_MP_CIFR
    name: RCC_MP_CIFR
  - byte_offset: 1052
    description: This register is used to program the delay between the moment where
      the system exits from one of the Stop modes, and the moment where it is allowed
      to enable the PLLs and provide a clock to bridges and processors. If TZEN =
      , this register can only be modified in secure mode.
    fieldset: RCC_PWRLPDLYCR
    name: RCC_PWRLPDLYCR
  - byte_offset: 1056
    description: 'This register is dedicated to the BOOTROM code in order to update
      the reset source. This register is updated by the BOOTROM code, after a power-on
      reset (por_rst), a system reset (nreset), or an exit from Standby or CStandby.
      The application software shall not use this register. In order to identify the
      reset source, the MPU application must use RCC MPU Reset Status Clear Register
      (RCC_MP_RSTSCLRR), and the MCU application must use the RCC MCU Reset Status
      Clear Register (RCC_MC_RSTSCLRR).Writing has no effect, reading will return
      the effective values of the corresponding bits. Writing a sets the corresponding
      bit to .Refer to Section10.3.13: Reset source identification for details.The
      register is located in VDDCORE.If TZEN = , this register can only be modified
      in secure mode.'
