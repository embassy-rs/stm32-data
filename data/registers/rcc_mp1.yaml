    fieldset: RCC_MP_SREQCLRR
    name: RCC_MP_SREQCLRR
  - byte_offset: 268
    description: The register contains global control bits. If TZEN = , this register
      can only be modified in secure mode.
    fieldset: RCC_MP_GCR
    name: RCC_MP_GCR
  - byte_offset: 272
    description: This register is used to control the behavior of the warm reset.
      If TZEN = , this register can only be modified in secure mode.
    fieldset: RCC_MP_APRSTCR
    name: RCC_MP_APRSTCR
  - access: Read
    byte_offset: 276
    description: This register provides a status of the RDCTL. If TZEN = , this register
      can only be modified in secure mode.
    fieldset: RCC_MP_APRSTSR
    name: RCC_MP_APRSTSR
  - byte_offset: 320
    description: 'This register is used to control the LSE function. Wait states are
      inserted in case of successive write accesses to this register. The number of
      wait states may be up to 7 cycles of AHB4 clock.After a system reset, the register
      RCC_BDCR is write-protected. In order to modify this register, the DBP bit in
      the PWR control register 1 (PWR_CR1) has to be set to . Bits of RCC_BDCR register
      are only reset after a backup domain reset: nreset_vsw (see Section10.3.6: Backup
      domain reset). Any other internal or external reset will not have any effect
      on these bits.This register is located into the VSW domain. If TZEN = , this
      register can only be modified in secure mode.'
    fieldset: RCC_BDCR
    name: RCC_BDCR
  - byte_offset: 324
    description: This register is used to control the minimum NRST active duration
      and LSI function.0 to 7 wait states are inserted for word, half-word and byte
      accesses. Wait states are inserted in case of successive accesses to this register.This
      register is reset by the por_rst reset, and it is located into the VDD domain.
      If TZEN = , this register can only be modified in secure mode.
    fieldset: RCC_RDLSICR
    name: RCC_RDLSICR
  - byte_offset: 384
    description: This register is used to activate the reset of the corresponding
      peripheral. Writing has no effect, reading will return the effective values
      of the corresponding bits. Writing a activates the reset of the corresponding
      peripheral.
    fieldset: RCC_APB4RSTSETR
    name: RCC_APB4RSTSETR
  - byte_offset: 388
