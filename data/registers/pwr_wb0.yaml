    enum: WUF
  - name: WUF4
    description: WUF4 WakeUp Flag 4 (PB4) This bit is set when a wakeup is detected on wakeup line 4. It is cleared by a reset pad or by writing 1 in this bit field. writting this bit, clears the interrupt:.
    bit_offset: 4
    bit_size: 1
    enum: WUF
  - name: WUF5
    description: WUF5 WakeUp Flag 5 (PB5) This bit is set when a wakeup is detected on wakeup line 5. It is cleared by a reset pad or by writing 1 in this bit field. writting this bit, clears the interrupt:.
    bit_offset: 5
    bit_size: 1
    enum: WUF
  - name: WUF6
    description: WUF6 WakeUp Flag 6 (PB6) This bit is set when a wakeup is detected on wakeup line 6. It is cleared by a reset pad or by writing 1 in this bit field. writting this bit, clears the interrupt:.
    bit_offset: 6
    bit_size: 1
    enum: WUF
  - name: WUF7
    description: WUF7 WakeUp Flag 7 (PB7) This bit is set when a wakeup is detected on wakeup line 7. It is cleared by a reset pad or by writing 1 in this bit field. writting this bit, clears the interrupt:.
    bit_offset: 7
    bit_size: 1
    enum: WUF
  - name: WUF8
    description: WUF8 WakeUp Flag 8 (PA8) This bit is set when a wakeup is detected on wakeup line 8. It is cleared by a reset pad or by writing 1 in this bit field. writting this bit, clears the interrupt:.
    bit_offset: 8
    bit_size: 1
    enum: WUF
  - name: WUF9
    description: WUF9 WakeUp Flag 9 (PA9) This bit is set when a wakeup is detected on wakeup line 9. It is cleared by a reset pad or by writing 1 in this bit field. writting this bit, clears the interrupt:.
    bit_offset: 9
    bit_size: 1
    enum: WUF
  - name: WUF10
    description: WUF10 WakeUp Flag 10 (PA10) This bit is set when a wakeup is detected on wakeup line 10. It is cleared by a reset pad or by writing 1 in this bit field. writting this bit, clears the interrupt:.
    bit_offset: 10
    bit_size: 1
    enum: WUF
  - name: WUF11
    description: WUF11 WakeUp Flag 11 (PA11) This bit is set when a wakeup is detected on wakeup line 11. It is cleared by a reset pad or by writing 1 in this bit field. writting this bit, clears the interrupt:.
    bit_offset: 11
    bit_size: 1
    enum: WUF
  - name: WBLEF
    description: 'WBLEF: BLE wakeup flag. 0: no wakeup from BLE occurred since last clear. 1: a wakeup from BLE occurred since last clear. Cleared by writing 1 in this bit.'
    bit_offset: 12
    bit_size: 1
  - name: WBLEHCPUF
    description: 'WBLEHCPUF: BLE Host CPU wakeup flag. 0: no wakeup from BLE Host CPU occurred since last clear. 1: a wakeup from BLE Host CPU occurred since last clear. Cleared by writing 1 in this bit.'
    bit_offset: 13
    bit_size: 1
  - name: IWUF2
    description: 'IWUF2: Internal wakeup 2 flag (LPUART). 0: no wakeup from LPUART occurred since last clear. 1: a wakeup from LPUART occurred since last clear. Note: The user must clear the LPUART wakeup flag inside the LPUART IP to clear this bit (mirror of the LPUART wakeup line on the PWRC block).'
    bit_offset: 14
    bit_size: 1
  - name: IWUF
    description: 'IWUF: Internal wakeup flag (RTC). 0: no wakeup from RTC occurred since last clear. 1: a wakeup from RTC occurred since last clear. Note: The user must clear the RTC wakeup flag inside the RTC IP to clear this bit (mirror of the RTC wakeup line on the PWRC block).'
    bit_offset: 15
    bit_size: 1
fieldset/SR2:
  description: SR2 register.
  fields:
  - name: SMPSBYPR
    description: 'SMPSBYPR: SMPS Force Bypass Control Replica This bit mirrors the actual BYPASS_3V3 control signal driven to the SMPS regulator, dependant on the real working state.'
    bit_offset: 0
    bit_size: 1
  - name: SMPSENR
    description: 'SMPSENR: SMPS Enable Control Replica This bit mirrors the actual ENABLE_3V3 control signal driven to the SMPS regulator, dependant on the real working state.'
