fieldset/CR1:
  description: CR1 register.
  fields:
  - name: LPMS
    description: LPMS Low Power Mode Selection Selection of the low power mode entered when CPU enters DEEP SLEEP mode and BLE is rdy2sleep.
    bit_offset: 0
    bit_size: 1
    enum: LPMS
  - name: ENSDNBOR
    description: 'ENSDNBOR: Enable BOR supply monitoring during shutdown mode.'
    bit_offset: 1
    bit_size: 1
    enum: ENSDNBOR
  - name: IBIAS_RUN_AUTO
    description: 'IBIAS_RUN_AUTO: Enable automatic IBIAS control during RUN/DEEPSTOP mode. 0: IBIAS control is manual (and controlled by IBIAS_RUN_STATE register) 1: IBIAS control is automatic (default).'
    bit_offset: 2
    bit_size: 1
  - name: IBIAS_RUN_STATE
    description: 'IBIAS_RUN_STATE: Enable/Disable IBIAS during RUN mode when automatic mode is disabled. 0: IBIAS control is disabled (default). 1: IBIAS control is enabled.'
    bit_offset: 3
    bit_size: 1
  - name: APC
    description: APC Apply Pull-up and pull-down configuration from CPU.
    bit_offset: 4
    bit_size: 1
    enum: APC
  - name: ENBORH
    description: 'ENBORH: enable BORH configuration.'
    bit_offset: 5
    bit_size: 1
    enum: ENBORH
  - name: SELBORH
    description: 'SELBORH[1:0]: BORH selection of Vbor threshold.'
    bit_offset: 6
    bit_size: 2
    enum: SELBORH
  - name: ENBORL
    description: 'ENBORL: Enable BORL reset supervising during RUN mode. 0: No BORL is monitored during RUN mode. 1: BORL is monitored during RUN mode (a POR reset will happen if VDDIO goes below 1.6V during RUN mode) (default). Note: Enabling this feature prevents blocking the device if VDDIO goes below supported voltages during RUN.'
    bit_offset: 8
    bit_size: 1
fieldset/CR2:
  description: CR2 register.
  fields:
  - name: PVDE
    description: PVDE Programmable Voltage Detector Enable When this bit is set the Power Voltage Detector is enabled.
    bit_offset: 0
    bit_size: 1
  - name: PVDLS
    description: PVDLS[2:0] Programmable Voltage Detector Level selection then PVDO=1).
    bit_offset: 1
    bit_size: 3
    enum: PVDLS
  - name: DBGRET
    description: 'DBGRET: PA2 and PA3 retention enable after DEEPSTOP 0: PA2, PA3 don''t retain their status exiting from DEEPSTOP. (default) 1: PA2, PA3 retain their status exiting from DEEPSTOP.'
    bit_offset: 4
    bit_size: 1
  - name: RAMRET1
    description: 'Enables the RAM2 bank retention in DEEPSTOP mode.'
    bit_offset: 5
    bit_size: 1
  - name: RAMRET2
    description: 'Enables the RAM2 bank retention in DEEPSTOP mode.'
    bit_offset: 6
    bit_size: 1
  - name: RAMRET3
    description: 'Enables the RAM3 bank retention in DEEPSTOP mode.'
    bit_offset: 7
    bit_size: 1
  - name: GPIORET
    description: 'GPIORET: GPIO retention enable. 0: GPIO don''t retain their status during DEEPSTOP and exiting from DEEPSTOP (default) 1: GPIO retain their status during DEEPSTOP and exiting from DEEPSTOP. Note: it''s mandatory to ensure this bit is set before entering DEEPSTOP unless DBRG.DEEPSTOP2 bit is set.'
    bit_offset: 8
    bit_size: 1
  - name: ENTS
    description: 'ENTS: Enable Temperature Sensor.'
    bit_offset: 9
    bit_size: 1
  - name: LSILPMUFEN
    description: LSI LPMU force enable.
    bit_offset: 10
    bit_size: 1
