    bit_offset: 2
    bit_size: 1
    enum: SMPSRDY
  - name: IOBOOTVAL2
    description: 'Bit3: PB15 input value on VDD33 latched at POR Bit2: PB14 input value on VDD33 latched at POR Bit1: PB13 input value on VDD33 latched at POR Bit0: PB12 input value on VDD33 latched at POR.'
