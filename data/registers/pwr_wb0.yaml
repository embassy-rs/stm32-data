fieldset/SR1:
  description: SR1 register.
  fields:
  - name: WUF0
    description: WUF0 WakeUp Flag 0 (PB0) This bit is set when a wakeup is detected on wakeup line 0. It is cleared by a reset pad or by writing 1 in this bit field. writting this bit, clears the interrupt:.
    bit_offset: 0
    bit_size: 1
    enum: WUF
  - name: WUF1
    description: WUF1 WakeUp Flag 1 (PB1) This bit is set when a wakeup is detected on wakeup line 1. It is cleared by a reset pad or by writing 1 in this bit field. writting this bit, clears the interrupt:.
    bit_offset: 1
