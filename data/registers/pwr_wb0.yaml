fieldset/DBGR:
  description: DBGR register.
  fields:
  - name: DEEPSTOP2
    description: 'DEEPSTOP2: DEEPSTOP2 low power saving emulation enable. 0: normal DEEPSTOP will be applied 1: DEEPSTOP2 (debugger features not lost) will be applied instead of DEEPSTOP.'
    bit_offset: 0
    bit_size: 1
  - name: DIS_PRECH
    description: 'DIS_PRECH[2:0]: disable precharge during deepstop (debug) - 111: precharge and SMPS monitoring are disabled (whatever CR5.SMPSLPOPEN) - 101: precharge are activated only at deepstop exit (to be used only with CR5.SMPSLPOPEN=1) - else: No effect (default 0x0).'
    bit_offset: 13
    bit_size: 3
fieldset/EXTSRR:
  description: EXTSRR register.
  fields:
  - name: DEEPSTOPF
    description: DEEPSTOPF System DeepStop Flag This bit is set by hardware and cleared only by a POR reset or by writing '1' in this bit field.
    bit_offset: 9
    bit_size: 1
    enum: DEEPSTOPF
  - name: RFPHASEF
    description: RFPHASEF RFPHASE Flag This bit is set by hardware after a Radio wake-up event (BLE activation); it is cleared either by software, writing '1' in this bit field, or by hardware when Ready2Sleep signal is asserted by the Radio IP.
    bit_offset: 10
    bit_size: 1
    enum: RFPHASEF
