fieldset/CR5:
  description: CR5 register.
  fields:
  - name: SMPSLVL
    description: SMPSLVL[3:0] SMPS Output Level Voltage Selection Select the SMPS output voltage with a granularity of 50mV. Default = '0100' (1.4V) Vout = 1.2 + 0.05*SMPSOUT (V).
    bit_offset: 0
    bit_size: 4
  - name: SMPSBOMSEL
    description: 'SMPSBOMSEL: SMPS BOM Selection:.'
    bit_offset: 4
    bit_size: 2
    enum: SMPSBOMSEL
  - name: SMPSFRDY
    description: SMPSFB Force ready check When this bit is set, the SMPS FSM will consider the SMPS ready.
    bit_offset: 7
    bit_size: 1
    enum: SMPSFRDY
  - name: SMPSLPOPEN
    description: 'SMPSLPOPEN: In Low Power mode SMPS is in OPEN mode (instead of PRECHARGE mode). When this bit is set, when the chip is in Low power mode the SMPS regulator will be disabled (HZ) Documentation needed.'
    bit_offset: 8
    bit_size: 1
    enum: SMPSLPOPEN
  - name: SMPSFBYP
    description: SMPSFB Force SMPS Regulator in bypass mode When this bit is set, the SMPS regulator will be forced to operate in precharge mode. the actual state of SMPS can be observed thanks to the replica SR2.SMPSBYPR.
    bit_offset: 9
    bit_size: 1
    enum: SMPSFBYP
  - name: NOSMPS
    description: 'NOSMPS: No SMPS Mode When this bit is set, the SMPS regulator will be disabled. Note that this configuration should be used only when SMPS_FB pad is directly connected to VBATT or Vext, without L/C BOM.'
    bit_offset: 10
    bit_size: 1
  - name: SMPS_ENA_DCM
    description: 'SMPS_ENA_DCM: enable discontinuous conduction mode.'
    bit_offset: 11
    bit_size: 1
  - name: CLKDETR_DISABLE
    description: 'CLKDETR_DISABLE: disable SMPS clock detection The SMPS clock detection enables an automatic SMPS bypass switching in case of unwanted loss of SMPS clock.'
    bit_offset: 12
    bit_size: 1
  - name: SMPS_PRECH_CUR_SEL
    description: SMPS_PRECH_CUR_SEL[1:0] Selection for SMPS PRECHARGE limit current.
    bit_offset: 13
    bit_size: 2
    enum: SMPS_PRECH_CUR_SEL
