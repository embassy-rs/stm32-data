block/CPU:
  description: CPU-specific EXTI registers
  items:
  - name: IMR
    description: CPU x interrupt mask register
    array:
      len: 3
      stride: 16
    byte_offset: 0
    fieldset: LINES
  - name: EMR
    description: CPU x event mask register
    array:
      len: 3
      stride: 16
    byte_offset: 4
    fieldset: LINES
  - name: PR
    description: CPU x pending register
    array:
      len: 3
      stride: 16
    byte_offset: 8
    fieldset: LINES
block/EXTI:
  description: External interrupt/event controller
  items:
  - name: RTSR
    description: Rising trigger selection register
    array:
      len: 3
      stride: 32
    byte_offset: 0
    fieldset: LINES
  - name: FTSR
    description: Falling trigger selection register
    array:
      len: 3
      stride: 32
    byte_offset: 4
    fieldset: LINES
  - name: SWIER
    description: Software interrupt event register
    array:
      len: 3
      stride: 32
    byte_offset: 8
    fieldset: LINES
  - name: CPU
    description: CPU-specific registers
    array:
      len: 2
      stride: 64
    byte_offset: 128
    block: CPU
fieldset/LINES:
  description: EXTI lines register, 1 bit per line
  fields:
  - name: LINE
    description: EXTI line
    bit_offset: 0
    bit_size: 1
    array:
      len: 32
      stride: 1
