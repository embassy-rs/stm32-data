block/CCB:
  description: Coupling and chaining bridge
  items:
  - name: CR
    description: CCB control register
    byte_offset: 0
    fieldset: CR
  - name: SR
    description: CCB status register
    byte_offset: 4
    access: Read
    fieldset: SR
  - name: REFTAGR
    description: CCB reference tag register
    array:
      len: 4
      stride: 4
    byte_offset: 16
fieldset/CR:
  description: CCB control register
  fields:
  - name: CCOP
    description: Coupling and chaining operation
    bit_offset: 0
    bit_size: 8
  - name: IPRST
    description: CCB reset
    bit_offset: 31
    bit_size: 1
fieldset/SR:
  description: CCB status register
  fields:
  - name: OPSTEP
    description: Operation step
    bit_offset: 0
    bit_size: 5
  - name: OPERR
    description: Operation error
    bit_offset: 8
    bit_size: 5
  - name: BUSY
    description: CCB busy
    bit_offset: 16
    bit_size: 1
  - name: TAMP_EVT
    description: Tamper event flag
    bit_offset: 24
    bit_size: 1
    array:
      len: 5
      stride: 1
