    bit_size: 4
  - name: REVAND
    description: Metal fix version.
    bit_offset: 4
    bit_size: 4
fieldset/DBGMCU_PIDR4:
  description: DBGMCU CoreSight peripheral identity register 4.
  fields:
  - name: JEP106CON
    description: JEP106 continuation code.
    bit_offset: 0
    bit_size: 4
  - name: SIZE
    description: Register file size.
    bit_offset: 4
    bit_size: 4
    enum: SIZE
fieldset/DBGMCU_SR:
  description: DBGMCU status register.
  fields:
  - name: AP_PRESENT
    description: Access port present.
    bit_offset: 0
    bit_size: 16
  - name: AP_ENABLED
    description: Access port enable.
    bit_offset: 16
    bit_size: 16
enum/SIZE:
  bit_size: 4
  variants:
  - name: B_0x0
    description: The register file occupies a single 4-Kbyte region.
    value: 0
enum/TRACE_MODE:
  bit_size: 2
  variants:
  - name: B_0x0
    description: Trace pins assigned for asynchronous mode (TRACESWO).
    value: 0
  - name: B_0x1
    description: Trace pins assigned for synchronous mode with a port width of 1 (TRACECK, TRACED0).
    value: 1
  - name: B_0x2
    description: Trace pins assigned for synchronous mode with a port width of 2 ((TRACECK, TRACED0-1).
    value: 2
  - name: B_0x3
    description: Trace pins assigned for synchronous mode with a port width of 4 ((TRACECK, TRACED0-3).
    value: 3
