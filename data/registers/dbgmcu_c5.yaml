    description: JEP106 identity code bits [3:0].
    bit_offset: 4
    bit_size: 4
fieldset/DBGMCU_PIDR2:
  description: DBGMCU CoreSight peripheral identity register 2.
  fields:
  - name: JEP106ID
    description: JEP106 identity code bits [6:4].
    bit_offset: 0
    bit_size: 3
