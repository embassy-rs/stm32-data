block/FLASH:
  description: 4kb addressable space.
  items:
  - name: COMMAND
    description: COMMAND register.
    byte_offset: 0
    fieldset: COMMAND
  - name: CONFIG
    description: CONFIG register.
    byte_offset: 4
    fieldset: CONFIG
  - name: IRQSTAT
    description: IRQSTAT register.
    byte_offset: 8
    fieldset: IRQSTAT
  - name: IRQMASK
    description: IRQMASK register.
    byte_offset: 12
    fieldset: IRQMASK
  - name: IRQRAW
    description: IRQRAW register.
    byte_offset: 16
    fieldset: IRQRAW
  - name: SIZE
    description: SIZE register.
    byte_offset: 20
    access: Read
    fieldset: SIZE
  - name: ADDRESS
    description: ADDRESS register.
    byte_offset: 24
    fieldset: ADDRESS
  - name: LFSRVAL
    description: LFSRVAL register.
    byte_offset: 36
    access: Read
    fieldset: LFSRVAL
  - name: PAGEPROT0
    description: PAGEPROT0 register.
    byte_offset: 52
    fieldset: PAGEPROT0
  - name: PAGEPROT1
    description: PAGEPROT1 register.
    byte_offset: 56
    fieldset: PAGEPROT1
  - name: DATA0
    description: DATA0 register.
    byte_offset: 64
    fieldset: DATA0
  - name: DATA1
    description: DATA1 register.
    byte_offset: 68
    fieldset: DATA1
  - name: DATA2
    description: DATA2 register.
    byte_offset: 72
    fieldset: DATA2
  - name: DATA3
    description: DATA3 register.
    byte_offset: 76
    fieldset: DATA3
fieldset/ADDRESS:
  description: ADDRESS register.
  fields:
  - name: YADDR
    description: Flash column address offset to be used with some COMMAND.
    bit_offset: 0
    bit_size: 6
  - name: XADDR
    description: Flash row address offset to be used with some COMMAND.
    bit_offset: 6
    bit_size: 10
fieldset/COMMAND:
  description: COMMAND register.
  fields:
  - name: COMMAND
    description: 'Macro commands for flash operations (may require DATA0...DATA3 to be set): - 0x11 : ERASE - 0x22 : MASSERASE - 0x33 : WRITE - 0x55 : MASSREAD - 0xAA : SLEEP - 0xBB : WAKEUP - 0xCC : BURSTWRITE - 0xEE : OTPWRITE - 0xFF : KEYWRITE.'
    bit_offset: 0
    bit_size: 8
fieldset/CONFIG:
  description: CONFIG register.
  fields:
  - name: REMAP
    description: Bit to redirect boot area on SRAM0.
    bit_offset: 1
    bit_size: 1
  - name: DIS_GROUP_WRITE
    description: 'Burst write Control: - 0 : burst write allowed - 1 : burst write forbidden.'
    bit_offset: 2
    bit_size: 1
  - name: WAIT_STATES
    description: Number of wait states to be inserted on Flash read (AHB accesses).
    bit_offset: 4
    bit_size: 2
fieldset/DATA0:
  description: DATA0 register.
  fields:
  - name: DATA0
    description: Value to be used as DATA for any COMMAND of type WRITE and compare value for MASSREAD.
    bit_offset: 0
    bit_size: 32
fieldset/DATA1:
  description: DATA1 register.
  fields:
  - name: DATA1
    description: Value to be used as DATA for any COMMAND of type WRITE.
    bit_offset: 0
    bit_size: 32
fieldset/DATA2:
  description: DATA2 register.
  fields:
  - name: DATA2
    description: Value to be used as DATA for any COMMAND of type WRITE.
    bit_offset: 0
    bit_size: 32
fieldset/DATA3:
  description: DATA3 register.
  fields:
  - name: DATA3
    description: Value to be used as DATA for any COMMAND of type WRITE.
    bit_offset: 0
    bit_size: 32
fieldset/IRQMASK:
  description: IRQMASK register.
  fields:
  - name: CMDDONEM
    description: Command done mask.
    bit_offset: 0
    bit_size: 1
  - name: CMDSTARTM
    description: Command started mask.
    bit_offset: 1
    bit_size: 1
  - name: CMDERRM
    description: Command error mask.
    bit_offset: 2
    bit_size: 1
  - name: ILLCMDM
    description: Illegal command mask.
    bit_offset: 3
    bit_size: 1
  - name: READOKM
    description: Mass read OK mask.
    bit_offset: 4
    bit_size: 1
  - name: FNREADYM
    description: '(1: mask, 0: inactive) FNREADY_MIS mask.'
    bit_offset: 5
    bit_size: 1
fieldset/IRQRAW:
  description: IRQRAW register.
  fields:
  - name: CMDDONE_RIS
    description: Command done raw/unmasked interrupt status. This it is set once the requested command execution is completed. Cleared by writing 1.
    bit_offset: 0
    bit_size: 1
  - name: CMDSTART_RIS
    description: Command started raw/unmasked interrupt status. This bit is set once the requested command execution has started.
    bit_offset: 1
    bit_size: 1
  - name: CMDERR_RIS
    description: Command error raw/unmasked interrupt status.
    bit_offset: 2
    bit_size: 1
  - name: ILLCMD_RIS
    description: Illegal command raw/unmasked interrupt status.
    bit_offset: 3
    bit_size: 1
  - name: READOK_RIS
    description: Mass read OK raw/unmasked interrupt status.
    bit_offset: 4
    bit_size: 1
  - name: CMDSLEEPERR_RIS
    description: '(1: active, 0: inactive) COMMAND issued while flash in sleep-mode (SLM=1).'
    bit_offset: 5
    bit_size: 1
fieldset/IRQSTAT:
  description: IRQSTAT register.
  fields:
  - name: CMDDONE_MIS
    description: Command done masked interrupt status.
    bit_offset: 0
    bit_size: 1
  - name: CMDSTART_MIS
    description: Command started masked interrupt status.
    bit_offset: 1
    bit_size: 1
  - name: CMDERR_MIS
    description: Command error masked interrupt status.
    bit_offset: 2
    bit_size: 1
  - name: ILLCMD_MIS
    description: Illegal command masked interrupt status.
    bit_offset: 3
    bit_size: 1
  - name: READOK_MIS
    description: Mass read OK masked interrupt status.
    bit_offset: 4
    bit_size: 1
  - name: FNREADY_MIS
    description: '(1: clear, 0: inactive) FNREADY_MIS flag.'
    bit_offset: 5
    bit_size: 1
fieldset/LFSRVAL:
  description: LFSRVAL register.
  fields:
  - name: LFSRVAL
    description: Flash read data CRC signature.
    bit_offset: 0
    bit_size: 32
fieldset/PAGEPROT0:
  description: PAGEPROT0 register.
  fields:
  - name: SEG0
    description: First segment definition.
    bit_offset: 0
    bit_size: 16
  - name: SEG1
    description: Second segment definition. See SEG0 description for details on SEG1[31:16] content.
    bit_offset: 16
    bit_size: 16
fieldset/PAGEPROT1:
  description: PAGEPROT1 register.
  fields:
  - name: SEG2
    description: Third segment definition. See PAGEPROT0 SEG0 description for details on SEG2[15:0] content.
    bit_offset: 0
    bit_size: 16
  - name: SEG3
    description: Fourth segment definition. See PAGEPROT0 SEG0 description for details on SEG3[15:0] content.
    bit_offset: 16
    bit_size: 16
fieldset/SIZE:
  description: SIZE register.
  fields:
  - name: FLASH_SIZE
    description: 'Maximum valid address for flash memory: - 00 : 0x0BFFF (192kb) - 01 : 0x0FFFF (256kb) - 10 : 0x17FFF (384kb) - 11 : 0x1FFFF (512kb).'
    bit_offset: 0
    bit_size: 16
  - name: RAM_SIZE
    description: 'RAM memory size selection: - 00 : 32kb - 01 : 32kb - 10 : 48kb - 11 : 64kb.'
    bit_offset: 17
    bit_size: 2
  - name: FLASH_SECURE
    description: 'Flash memory protection (0: no key present, 1: key present).'
    bit_offset: 19
    bit_size: 1
  - name: SWD_DISABLE
    description: 'Flash+SWD protection: 0: No SWD protection (refer to FLASH_SECURE) 1: Flash and SWD protected.'
    bit_offset: 20
    bit_size: 1
  - name: PACKAGE_SIZE
    description: 'Package selection: - 0- : CSP - 10 : 32pins - 11 : 48pins.'
    bit_offset: 21
    bit_size: 2
